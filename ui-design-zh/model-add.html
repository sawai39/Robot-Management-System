    <script>
        const langBtn = document.getElementById('langBtn');
        const langDropdown = document.getElementById('langDropdown');

        langBtn.addEventListener('click', () => {
            langDropdown.classList.toggle('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!langBtn.contains(e.target) && !langDropdown.contains(e.target)) {
                langDropdown.classList.add('hidden');
            }
        });

        // Toggle submenu functionality
        function toggleSubmenu(id) {
            const submenu = document.getElementById(id);
            const arrow = document.getElementById(id.replace('submenu', 'arrow'));
            
            if (submenu) {
                submenu.classList.toggle('expanded');
                if (arrow) {
                    arrow.classList.toggle('rotate-180');
                }
            }
        }

        // Delete property functionality
        document.querySelectorAll('button').forEach(button => {
            if (button.textContent.includes('删除')) {
                button.addEventListener('click', (e) => {
                    e.preventDefault();
                    // Delete property logic here
                    if (confirm('确定要删除这个属性吗？')) {
                        // Remove the parent element
                        button.closest('.bg-gray-50').remove();
                    }
                });
            }
        });

        // Add property functionality
        function createPropertyForm() {
            return `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Key</label>
                            <input type="text" class="w-full px-3 py-1 border border-gray-300 rounded-lg focus:outline-none focus:border-primary" placeholder="请输入键名">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">标签</label>
                            <input type="text" class="w-full px-3 py-1 border border-gray-300 rounded-lg focus:outline-none focus:border-primary" placeholder="请输入标签">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">类型</label>
                            <select class="w-full px-3 py-1 border border-gray-300 rounded-lg focus:outline-none focus:border-primary">
                                <option value="string">string</option>
                                <option value="float">float</option>
                                <option value="json">json</option>
                                <option value="boolean">boolean</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">值</label>
                            <input type="text" class="w-full px-3 py-1 border border-gray-300 rounded-lg focus:outline-none focus:border-primary" placeholder="请输入值">
                        </div>
                        <div class="lg:col-span-4 flex items-center">
                            <label class="flex items-center">
                                <input type="checkbox" class="mr-2">
                                <span class="text-sm text-gray-700">必填</span>
                            </label>
                            <button type="button" class="ml-auto px-3 py-1 text-error border border-error rounded hover:bg-error hover:text-white transition-colors text-sm">
                                删除
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Add equipment property
        document.getElementById('add-equip-property').addEventListener('click', () => {
            const container = document.getElementById('equip-properties-container');
            const propertyForm = createPropertyForm();
            container.insertAdjacentHTML('beforeend', propertyForm);
            
            // Add delete functionality to the new property
            const deleteButtons = container.querySelectorAll('button');
            const newDeleteButton = deleteButtons[deleteButtons.length - 1];
            newDeleteButton.addEventListener('click', (e) => {
                e.preventDefault();
                if (confirm('确定要删除这个属性吗？')) {
                    newDeleteButton.closest('.bg-gray-50').remove();
                }
            });
        });

        // Add dynamic property
        document.getElementById('add-dynamic-property').addEventListener('click', () => {
            const container = document.getElementById('dynamic-properties-container');
            const propertyForm = createPropertyForm();
            container.insertAdjacentHTML('beforeend', propertyForm);
            
            // Add delete functionality to the new property
            const deleteButtons = container.querySelectorAll('button');
            const newDeleteButton = deleteButtons[deleteButtons.length - 1];
            newDeleteButton.addEventListener('click', (e) => {
                e.preventDefault();
                if (confirm('确定要删除这个属性吗？')) {
                    newDeleteButton.closest('.bg-gray-50').remove();
                }
            });
        });
